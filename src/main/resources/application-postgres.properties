# PostgreSQL profile — use with: spring.profiles.active=local,postgres
# Or set env: SPRING_PROFILES_ACTIVE=local,postgres

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/mobile_pdb}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.h2.console.enabled=false

# Local: POSTGRES_LOCAL_PASSWORD in application-local-secrets.properties
# Railway: DATABASE_URL (see railway profile) — do not set password here
spring.datasource.password=${DB_PASSWORD:${POSTGRES_LOCAL_PASSWORD:}}
