# Production — SPRING_PROFILES_ACTIVE=prod,postgres,railway

server.port=${PORT:8080}
server.forward-headers-strategy=framework

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=false

app.auth.log-otp-in-dev=false
app.auth.expose-otp-in-response=false

# Brevo API (free tier, works on Railway/Render)
app.mail.delivery=brevo
app.mail.from=${MAIL_FROM:}
brevo.api-key=${BREVO_API_KEY:}

app.auth.jwt.secret=${JWT_SECRET}
app.auth.jwt.access-token-ttl-seconds=${JWT_TTL_SECONDS:86400}
