# Production profile — use with: SPRING_PROFILES_ACTIVE=prod,postgres

server.port=${PORT:8080}
server.forward-headers-strategy=framework

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=false

# Security: never expose OTP in API responses in production
app.auth.log-otp-in-dev=false
app.auth.expose-otp-in-response=false

# Production must use real SMTP (configure via environment variables)
app.mail.mode=smtp

# JWT must be set via JWT_SECRET env var (min 32 characters)
app.auth.jwt.secret=${JWT_SECRET}
app.auth.jwt.access-token-ttl-seconds=${JWT_TTL_SECONDS:86400}

# Mail (Spring Boot env binding: SPRING_MAIL_HOST, SPRING_MAIL_USERNAME, etc.)
spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=15000
spring.mail.properties.mail.smtp.timeout=15000
spring.mail.properties.mail.smtp.writetimeout=15000
app.mail.from=${MAIL_FROM:}
