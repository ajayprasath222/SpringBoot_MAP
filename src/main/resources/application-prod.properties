# Production — SPRING_PROFILES_ACTIVE=prod,postgres,railway

server.port=${PORT:8080}
server.forward-headers-strategy=framework

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=false

app.auth.log-otp-in-dev=false
app.auth.expose-otp-in-response=false
app.mail.mode=smtp
app.mail.provider=smtp

app.auth.jwt.secret=${JWT_SECRET}
app.auth.jwt.access-token-ttl-seconds=${JWT_TTL_SECONDS:86400}
app.mail.from=${MAIL_FROM:}

# Gmail SMTP — use port 465 + SSL on Railway if port 587 times out
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:465}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=${MAIL_SSL_ENABLE:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_STARTTLS_ENABLE:false}
spring.mail.properties.mail.smtp.starttls.required=false
spring.mail.properties.mail.smtp.ssl.trust=${MAIL_SSL_TRUST:smtp.gmail.com}
spring.mail.properties.mail.smtp.connectiontimeout=30000
spring.mail.properties.mail.smtp.timeout=30000
spring.mail.properties.mail.smtp.writetimeout=30000

# Optional Brevo API fallback: app.mail.provider=brevo-api + BREVO_API_KEY
brevo.api-key=${BREVO_API_KEY:}
