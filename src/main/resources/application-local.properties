# --- Local profile ---
# Mail mode: auto (default) | embedded | smtp
# auto = use real SMTP when credentials are in application-local-secrets.properties; else embedded dev server
app.mail.mode=${MAIL_MODE:auto}
app.mail.embedded-smtp-port=3025
app.auth.expose-otp-in-response=true

# SMTP / DB secrets load last and override defaults above
spring.config.import=optional:classpath:application-local-secrets.properties
