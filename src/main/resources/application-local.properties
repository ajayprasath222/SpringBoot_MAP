# --- Local profile ---
# Embedded SMTP defaults (used only when application-local-secrets.properties is missing).
app.mail.embedded=${MAIL_EMBEDDED:true}
app.mail.embedded-smtp-port=3025

spring.mail.host=127.0.0.1
spring.mail.port=${app.mail.embedded-smtp-port}
spring.mail.username=dev@printer.local
spring.mail.password=dev
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=false
spring.mail.properties.mail.smtp.starttls.required=false
app.mail.from=dev@printer.local

# Gmail secrets MUST load last so they override embedded settings above
spring.config.import=optional:classpath:application-local-secrets.properties
