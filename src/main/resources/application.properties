spring.application.name=printer_springBE
# Add ",postgres" to use PostgreSQL: local,postgres
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local,postgres}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# --- Auth / OTP ---
app.auth.otp.length=6
app.auth.otp.ttl-seconds=300
app.auth.otp.resend-cooldown-seconds=60
app.auth.otp.max-attempts=5
app.auth.registration-token.ttl-seconds=900
app.auth.log-otp-in-dev=true

# JWT (override in production via env)
app.auth.jwt.secret=${JWT_SECRET:change-this-dev-secret-key-min-32-chars!!}
app.auth.jwt.access-token-ttl-seconds=86400

# Product image upload
app.product.upload-dir=uploads/products
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=6MB
