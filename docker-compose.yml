services:
  db:
    image: postgres:16-alpine
    container_name: printer-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: mobile_pdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mobile_pdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: printer-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod,postgres
      DB_URL: jdbc:postgresql://db:5432/mobile_pdb
      DB_USERNAME: postgres
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      MAIL_FROM: ${MAIL_FROM}
      JPA_DDL_AUTO: ${JPA_DDL_AUTO:-update}
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  uploads:
